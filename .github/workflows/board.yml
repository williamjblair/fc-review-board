name: Build review board

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch:
  push:
    branches: [main]

# Least privilege for the official GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; let each run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch audit feed
        env:
          VERDICTS_URL: ${{ vars.VERDICTS_URL }}
        run: |
          curl -sfL "${VERDICTS_URL:-https://erdos.constellate.science/verdicts.json}" -o verdicts.json

      # generate.py fetches the open PRs itself, paginating the GitHub GraphQL
      # API in small pages (a single 200-PR query with file lists 502s). It
      # exits non-zero if the fetch fails, so the run fails rather than
      # deploying a broken board; the last good deploy stays and the hourly
      # cron retries.
      - name: Generate board
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 generate.py
          mkdir -p _site
          cp index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
